<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FCC Broadband CSV Upload</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { width: 100%; max-width: 540px; padding: 20px; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 32px; }
    h1 { font-size: 22px; color: #1a1a2e; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 28px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 6px; }
    input[type="text"], input[type="password"] { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; transition: border-color 0.2s; }
    input[type="text"]:focus, input[type="password"]:focus { border-color: #4f46e5; }
    .field { margin-bottom: 18px; }
    .drop-zone { border: 2px dashed #d1d5db; border-radius: 10px; padding: 36px 20px; text-align: center; cursor: pointer; transition: all 0.2s; background: #fafafa; margin-bottom: 18px; }
    .drop-zone:hover, .drop-zone.drag-over { border-color: #4f46e5; background: #f0f0ff; }
    .drop-zone p { font-size: 14px; color: #666; }
    .drop-zone .icon { font-size: 32px; margin-bottom: 8px; }
    .drop-zone .file-name { font-size: 13px; color: #4f46e5; font-weight: 600; margin-top: 8px; word-break: break-all; }
    .file-input { display: none; }
    .btn { width: 100%; padding: 12px; background: #4f46e5; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .btn:hover { background: #4338ca; }
    .btn:disabled { background: #a5a3d4; cursor: not-allowed; }
    .progress-wrap { margin-top: 18px; display: none; }
    .progress-bar { width: 100%; height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; width: 0%; background: #4f46e5; border-radius: 4px; transition: width 0.3s; }
    .progress-text { font-size: 12px; color: #666; margin-top: 6px; text-align: center; }
    .result { margin-top: 18px; padding: 16px; border-radius: 8px; font-size: 13px; line-height: 1.6; display: none; }
    .result.success { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
    .result.error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .result-table { width: 100%; margin-top: 8px; }
    .result-table td { padding: 3px 0; }
    .result-table td:first-child { font-weight: 600; padding-right: 12px; white-space: nowrap; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>FCC Broadband Upload</h1>
      <p class="subtitle">Upload FCC CSV files to populate broadband provider data</p>

      <div class="field">
        <label>Admin Token</label>
        <input type="password" id="token" placeholder="Paste your admin JWT token">
      </div>

      <div class="field">
        <label>State Code (optional, auto-detected from CSV)</label>
        <input type="text" id="state" placeholder="e.g. AL, CA, TX" maxlength="2">
      </div>

      <label>CSV File</label>
      <div class="drop-zone" id="dropZone">
        <div class="icon">&#128462;</div>
        <p>Drag & drop your CSV file here<br>or <u>click to browse</u></p>
        <div class="file-name" id="fileName"></div>
      </div>
      <input type="file" class="file-input" id="fileInput" accept=".csv">

      <button class="btn" id="uploadBtn" disabled>Upload CSV</button>

      <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-text" id="progressText">Uploading... 0%</div>
      </div>

      <div class="result" id="result"></div>
    </div>
  </div>

  <script>
    const dropZone   = document.getElementById('dropZone');
    const fileInput  = document.getElementById('fileInput');
    const fileName   = document.getElementById('fileName');
    const uploadBtn  = document.getElementById('uploadBtn');
    const progressWrap = document.getElementById('progressWrap');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    const resultDiv  = document.getElementById('result');

    let selectedFile = null;

    // Drop zone events
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file && file.name.toLowerCase().endsWith('.csv')) selectFile(file);
      else alert('Please select a .csv file');
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) selectFile(fileInput.files[0]);
    });

    function selectFile(file) {
      selectedFile = file;
      const size = (file.size / (1024 * 1024)).toFixed(1);
      fileName.textContent = `${file.name} (${size} MB)`;
      uploadBtn.disabled = false;
      resultDiv.style.display = 'none';
    }

    uploadBtn.addEventListener('click', async () => {
      const token = document.getElementById('token').value.trim();
      if (!token) return alert('Please enter your admin token');
      if (!selectedFile) return alert('Please select a CSV file');

      const state = document.getElementById('state').value.trim().toUpperCase();
      const formData = new FormData();
      formData.append('file', selectedFile);
      if (state) formData.append('state', state);

      uploadBtn.disabled = true;
      progressWrap.style.display = 'block';
      progressFill.style.width = '0%';
      progressText.textContent = 'Uploading... 0%';
      resultDiv.style.display = 'none';

      const xhr = new XMLHttpRequest();
      xhr.open('POST', '/api/fcc/upload');
      xhr.setRequestHeader('Authorization', `Bearer ${token}`);

      xhr.upload.addEventListener('progress', (e) => {
        if (e.lengthComputable) {
          const pct = Math.round((e.loaded / e.total) * 100);
          progressFill.style.width = pct + '%';
          progressText.textContent = pct < 100 ? `Uploading... ${pct}%` : 'Processing CSV, please wait...';
        }
      });

      xhr.addEventListener('load', () => {
        uploadBtn.disabled = false;
        try {
          const res = JSON.parse(xhr.responseText);
          if (xhr.status >= 200 && xhr.status < 300 && res.success) {
            const d = res.data;
            resultDiv.className = 'result success';
            resultDiv.innerHTML = `
              <strong>Upload successful!</strong>
              <table class="result-table">
                <tr><td>File</td><td>${d.file}</td></tr>
                <tr><td>State</td><td>${d.state}</td></tr>
                <tr><td>Technologies</td><td>${d.technologies.join(', ')}</td></tr>
                <tr><td>Raw Rows</td><td>${d.raw_rows.toLocaleString()}</td></tr>
                <tr><td>ZIP Providers</td><td>${d.zip_providers.toLocaleString()}</td></tr>
                <tr><td>Inserted</td><td>${d.inserted.toLocaleString()}</td></tr>
                <tr><td>Replaced</td><td>${d.replaced.toLocaleString()}</td></tr>
              </table>`;
          } else {
            resultDiv.className = 'result error';
            resultDiv.innerHTML = `<strong>Error:</strong> ${res.message || 'Upload failed'}`;
          }
        } catch (_) {
          resultDiv.className = 'result error';
          resultDiv.innerHTML = `<strong>Error:</strong> Unexpected response from server`;
        }
        resultDiv.style.display = 'block';
        progressWrap.style.display = 'none';
      });

      xhr.addEventListener('error', () => {
        uploadBtn.disabled = false;
        resultDiv.className = 'result error';
        resultDiv.innerHTML = '<strong>Error:</strong> Network error. Check if the server is running.';
        resultDiv.style.display = 'block';
        progressWrap.style.display = 'none';
      });

      xhr.send(formData);
    });
  </script>
</body>
</html>
